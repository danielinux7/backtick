  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png" />

  <meta property="og:description" content="Replay Binance markets candle by candle, place hypothetical trades, and watch them resolve." />

  <meta property="og:image" content="https://backtick.onrender.com/static/icons/og-image.png" />

  <meta name="twitter:title" content="Backtick — chart replay & trading sandbox" />
  <meta name="twitter:description" content="Replay Binance markets candle by candle, place hypothetical trades, and watch them resolve." />
  <meta name="twitter:image" content="https://backtick.onrender.com/static/icons/og-image.png" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body.auth { display: grid; place-items: center; min-height: 100svh; background: #0f1218; color: #e6e9ee; }
    .auth-card { width: min(380px, 92vw); background: #161a22; border: 1px solid #232936; border-radius: 12px; padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .auth-card h1 { margin: 0 0 6px; font-size: 22px; }
    .auth-card .subtitle { margin: 0 0 18px; opacity: 0.7; font-size: 13px; }
    .auth-card form { display: grid; gap: 10px; }
    .auth-card input[type=email], .auth-card input[type=password] {
      width: 100%; padding: 10px 12px; background: #0f1218; color: #e6e9ee;
      border: 1px solid #2a3142; border-radius: 8px; font: inherit;
    }
    .auth-card button.primary {
      padding: 10px 12px; background: #26a69a; color: #0f1218;
      border: 0; border-radius: 8px; font-weight: 600; cursor: pointer;
    }
    .auth-card button.primary:hover { background: #34c5b8; }
    .auth-card .divider { display: flex; align-items: center; gap: 12px; margin: 14px 0 8px; opacity: 0.6; font-size: 12px; }
    .auth-card .divider::before, .auth-card .divider::after { content: ""; flex: 1; height: 1px; background: #232936; }
    .auth-card .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 10px; background: #fff; color: #1a1a1a; border-radius: 8px;
      text-decoration: none; font-weight: 600; cursor: pointer; border: 0; font: inherit;
    }
    .auth-card .google-btn:hover { background: #f3f3f3; }
    .auth-card .toggle { text-align: center; font-size: 13px; opacity: 0.75; margin-top: 12px; }
    .auth-card .toggle a { color: #90caf9; }
    .auth-card .error { color: #ef5350; font-size: 13px; min-height: 1em; }
    .auth-card .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .auth-card .brand svg { width: 32px; height: 32px; }
    .auth-card .brand span { font-weight: 600; }
  </style>
</head>
<body class="auth">
  <div class="auth-card">
    <div class="brand">
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="40" height="40" rx="8" fill="#0f1218"/>
        <g transform="rotate(40 20 20)">
          <line x1="20" y1="6" x2="20" y2="34" stroke="#26a69a" stroke-width="2" stroke-linecap="round"/>
          <rect x="15" y="12" width="10" height="16" rx="2" fill="#26a69a"/>
        </g>
      </svg>
      <span>Backtick</span>
    </div>
    <h1 id="title">Sign in</h1>
    <p class="subtitle" id="subtitle">Welcome back. Pick up where you left off.</p>

    <form id="auth-form">
      <input type="email" id="email" placeholder="email" autocomplete="email" required />
      <input type="password" id="password" placeholder="password (min 8 chars)" autocomplete="current-password" minlength="8" required />
      <button type="submit" class="primary" id="submit-btn">Sign in</button>
      <div class="error" id="err"></div>
    </form>

    <div class="divider">or</div>
    <a class="google-btn" href="/api/auth/google/start">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.49h4.84a4.14 4.14 0 01-1.79 2.72v2.26h2.9c1.7-1.56 2.69-3.87 2.69-6.63z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.25c-.8.54-1.83.86-3.06.86-2.35 0-4.34-1.58-5.05-3.72H.96v2.33A9 9 0 009 18z"/>
        <path fill="#FBBC05" d="M3.95 10.71A5.4 5.4 0 013.66 9c0-.59.1-1.17.29-1.71V4.96H.96A9 9 0 000 9c0 1.45.35 2.82.96 4.04l2.99-2.33z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 009 0 9 9 0 00.96 4.96l2.99 2.33C4.66 5.16 6.65 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </a>

    <div class="toggle">
      <span id="toggle-prompt">No account?</span> <a href="#" id="toggle-link">Create one</a>
    </div>

    <div class="divider" id="guest-divider">or</div>
    <button type="button" class="google-btn" id="guest-btn"
            style="background:#2a3142;color:#d1d4dc;">
      Continue as guest
    </button>
    <div class="toggle" style="margin-top:6px;font-size:11px;opacity:0.55;">
      Trades + watchlist are saved on the server. Add an email + password any time to keep them past your browser session.
    </div>
  </div>

  <script>
    const form = document.getElementById("auth-form");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const submit = document.getElementById("submit-btn");
    const errEl = document.getElementById("err");
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const togglePrompt = document.getElementById("toggle-prompt");
    const toggleLink = document.getElementById("toggle-link");

    // Detect whether the visitor already has a guest cookie. If so:
    //  - hide the "Continue as guest" button (would orphan their data)
    //  - the register flow auto-routes to /api/auth/upgrade so they keep
    //    their trades + watchlist when they create their permanent account
    let isCurrentlyGuest = false;
    let guestDetectionDone = false;

    // ?upgrade=1 forces upgrade mode explicitly (e.g. from the header link).
    const params = new URLSearchParams(window.location.search);
    const isUpgrade = params.get("upgrade") === "1";

    let mode = isUpgrade ? "upgrade" : "login";
    function render() {
      const guestDivider = document.getElementById("guest-divider");
      const guestBtn = document.getElementById("guest-btn");
      if (mode === "upgrade") {
        title.textContent = "Save your account";
        subtitle.textContent = "Add an email + password to keep your trades + watchlist past this browser session.";
        submit.textContent = "Save account";
        password.setAttribute("autocomplete", "new-password");
        togglePrompt.textContent = "";
        toggleLink.textContent = "";
        // Hide guest button in upgrade mode — they already are a guest.
        if (guestDivider) guestDivider.style.display = "none";
        if (guestBtn) guestBtn.style.display = "none";
        return;
      }
      if (mode === "login") {
        title.textContent = "Sign in";
        subtitle.textContent = "Welcome back. Pick up where you left off.";
        submit.textContent = "Sign in";
        password.setAttribute("autocomplete", "current-password");
        togglePrompt.textContent = "No account?";
        toggleLink.textContent = "Create one";
      } else {
        title.textContent = "Create account";
        subtitle.textContent = "Start with email + password. You can link Google later.";
        submit.textContent = "Create account";
        password.setAttribute("autocomplete", "new-password");
        togglePrompt.textContent = "Already have an account?";
        toggleLink.textContent = "Sign in";
      }
    }
    toggleLink.addEventListener("click", (e) => {
      e.preventDefault();
      mode = mode === "login" ? "register" : "login";
      errEl.textContent = "";
      render();
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.textContent = "";
      submit.disabled = true;
      try {
        // Register-from-guest silently routes to /upgrade so the same user
        // row is reused — keeps trades, watchlist, and replay snapshots.
        const effectiveMode =
          mode === "register" && isCurrentlyGuest ? "upgrade" : mode;
        const path =
          effectiveMode === "login" ? "/api/auth/login" :
          effectiveMode === "register" ? "/api/auth/register" :
          "/api/auth/upgrade";
        const r = await fetch(path, {
          method: "POST",
          credentials: "include",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ email: email.value, password: password.value }),
        });
        if (!r.ok) {
          let msg = await r.text();
          try { msg = JSON.parse(msg).detail || msg; } catch (_) {}
          throw new Error(msg);
        }
        window.location.href = "/";
      } catch (err) {
        errEl.textContent = err.message || "Something went wrong";
      } finally {
        submit.disabled = false;
      }
    });

    document.getElementById("guest-btn").addEventListener("click", async () => {
      errEl.textContent = "";
      try {
        const r = await fetch("/api/auth/guest", {
          method: "POST",
          credentials: "include",
        });
        if (!r.ok) {
          let msg = await r.text();
          try { msg = JSON.parse(msg).detail || msg; } catch (_) {}
          throw new Error(msg);
        }
        window.location.href = "/";
      } catch (err) {
        errEl.textContent = err.message || "Could not start guest session";
      }
    });

    // Detect current guest cookie, then hide the now-redundant button and
    // tweak the copy so creating an account is clearly "save what I'm
    // already doing" rather than "start over."
    (async () => {
      try {
        const r = await fetch("/api/auth/me", { credentials: "include" });
        if (r.ok) {
          const me = await r.json();
          isCurrentlyGuest = !!me.is_guest;
        }
      } catch (_) { /* not authed — leave defaults */ }
      guestDetectionDone = true;
      if (isCurrentlyGuest) {
        const g = document.getElementById("guest-btn");
        const d = document.getElementById("guest-divider");
        if (g) g.style.display = "none";
        if (d) d.style.display = "none";
        // Soft hint for register mode (visible after they click "Create one")
        if (mode === "register" || mode === "upgrade") {
          subtitle.textContent = "Add an email + password to keep your trades + watchlist past this browser.";
        }
      }
    })();

    render();
  </script>
</body>
</html>
