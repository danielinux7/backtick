<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1218" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Backtick" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Backtick — replay & live trader's chart</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png" />
  <meta name="description" content="Replay Binance markets candle by candle, place hypothetical trades, and watch them resolve." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Backtick" />
  <meta property="og:title" content="Backtick — chart replay & trading sandbox" />
  <meta property="og:description" content="Replay Binance markets candle by candle, place hypothetical trades, and watch them resolve." />
  <meta property="og:url" content="https://backtick.onrender.com/" />
  <meta property="og:image" content="https://backtick.onrender.com/static/icons/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Backtick — chart replay & trading sandbox" />
  <meta name="twitter:description" content="Replay Binance markets candle by candle, place hypothetical trades, and watch them resolve." />
  <meta name="twitter:image" content="https://backtick.onrender.com/static/icons/og-image.png" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/themes/dark.css" />
  <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
</head>
<body>
  <header>
    <div class="brand">
      <svg class="logo" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="40" height="40" rx="8" fill="#0f1218"/>
        <g transform="rotate(40 20 20)">
          <line x1="20" y1="6" x2="20" y2="34" stroke="#26a69a" stroke-width="2" stroke-linecap="round"/>
          <rect x="15" y="12" width="10" height="16" rx="2" fill="#26a69a"/>
        </g>
      </svg>
      <span>Backtick</span>
    </div>
    <form id="setup-form" class="setup">
      <select name="mode" id="mode-select" title="Replay = historical chart; Live = real-time Binance stream">
        <option value="live" selected>Live</option>
        <option value="replay">Replay</option>
      </select>
      <div class="symbol-picker" id="symbol-picker">
        <input name="symbol" id="symbol-input" placeholder="SOLUSDT" value="SOLUSDT" autocomplete="off" required />
        <div class="symbol-popover" id="symbol-popover" hidden>
          <div class="symbol-section">
            <div class="symbol-section-label">Watchlist</div>
            <div class="symbol-list" id="watchlist-rows"><div class="symbol-empty">No saved symbols yet.</div></div>
          </div>
          <div class="symbol-section">
            <div class="symbol-section-label">Search</div>
            <div class="symbol-list" id="search-rows"><div class="symbol-empty">Type to search Binance…</div></div>
          </div>
        </div>
      </div>
      <select name="market">
        <option value="spot">spot</option>
        <option value="futures">futures</option>
      </select>
      <select name="tf" id="tf-select"></select>
      <input name="replay_date" id="replay-date" placeholder="dd/mm/yyyy" style="width:120px" />
      <span id="live-indicator" class="live-indicator" style="display:none">● LIVE</span>
    </form>
    <div id="status"></div>
    <div id="user-info" class="user-info"></div>
  </header>

  <main>
    <section class="chart-pane">
      <div class="chart-stack">
        <div id="chart"></div>
        <div class="pane-resize hidden" data-target="rsi"></div>
        <div id="rsi-chart"></div>
        <div class="pane-resize hidden" data-target="cvd"></div>
        <div id="cvd-chart"></div>
        <div id="arm-hint" class="arm-hint" style="display:none"></div>
        <span id="measure-summary" class="measure-readout"></span>

        <div class="overlay-launchers">
          <button type="button" id="cursor-tool" class="overlay-launcher active" title="Cursor — cancel active tool" aria-label="Cursor">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <line x1="12" y1="3" x2="12" y2="9"/>
              <line x1="12" y1="15" x2="12" y2="21"/>
              <line x1="3" y1="12" x2="9" y2="12"/>
              <line x1="15" y1="12" x2="21" y2="12"/>
            </svg>
          </button>
          <div class="overlay-group" id="tools-group">
            <button type="button" id="tools-launcher" class="overlay-launcher" title="Drawing tools" aria-expanded="false">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
            </button>
            <div id="tools-panel" class="overlay-panel icon-strip" hidden>
              <button type="button" class="overlay-row tool" data-tool="hline" title="Horizontal line" aria-label="Horizontal line">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                  <line x1="3" y1="12" x2="21" y2="12"/>
                  <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                </svg>
              </button>
              <button type="button" class="overlay-row tool" data-tool="measure" title="Measure" aria-label="Measure">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M3 8h18v8H3z"/>
                  <line x1="7" y1="8" x2="7" y2="12"/>
                  <line x1="11" y1="8" x2="11" y2="12"/>
                  <line x1="15" y1="8" x2="15" y2="12"/>
                  <line x1="19" y1="8" x2="19" y2="12"/>
                </svg>
              </button>
              <button type="button" class="overlay-row" id="clear-drawings" title="Clear drawings" aria-label="Clear drawings">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6M14 11v6"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="overlay-group" id="ind-group">
            <button type="button" id="ind-launcher" class="overlay-launcher" title="Indicators" aria-expanded="false">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="4" y1="6" x2="20" y2="6"/>
                <line x1="4" y1="12" x2="20" y2="12"/>
                <line x1="4" y1="18" x2="20" y2="18"/>
                <circle cx="16" cy="6" r="2.2" fill="#0f1218"/>
                <circle cx="9" cy="12" r="2.2" fill="#0f1218"/>
                <circle cx="14" cy="18" r="2.2" fill="#0f1218"/>
              </svg>
            </button>
            <div id="ind-panel" class="overlay-panel" hidden>
              <button type="button" class="overlay-row ind" data-kind="ema" data-period="20"><span>EMA 20</span></button>
              <button type="button" class="overlay-row ind" data-kind="ema" data-period="50"><span>EMA 50</span></button>
              <button type="button" class="overlay-row ind" data-kind="ema" data-period="200"><span>EMA 200</span></button>
              <button type="button" class="overlay-row ind" data-kind="rsi" data-period="14"><span>RSI 14</span></button>
              <button type="button" class="overlay-row ind" data-kind="cvd"><span>CVD</span></button>
              <button type="button" class="overlay-row ind" data-kind="volume"><span>Volume</span></button>
              <button type="button" class="overlay-row ind" data-kind="volprofile"><span>Vol Profile</span></button>
              <button type="button" class="overlay-row ind" data-kind="liq" title="Heuristic — top 0.5% taker prints by qty in the visible window"><span>Liq</span></button>
              <button type="button" class="overlay-row ind" data-kind="footprint" title="Per-candle buy/sell volume by price (visible when zoomed in enough)"><span>Footprint</span></button>
            </div>
          </div>
        </div>
      </div>
      <div class="controls">
        <div class="controls-left">
          <div class="mode-pill" id="speed-mode" role="tablist" aria-label="Replay mode">
            <button type="button" data-mode="tick" class="active" role="tab" aria-selected="true">Tick</button>
            <button type="button" data-mode="candle" role="tab" aria-selected="false">Candle</button>
          </div>
          <label>Speed <select id="speed"></select></label>
        </div>
        <div class="controls-center">
          <button id="back-1" class="icon-btn" disabled title="Previous (←)" aria-label="Previous">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
              <path d="M7 5h2v14H7zM20 5L9 12l11 7z"/>
            </svg>
          </button>
          <button id="play" class="icon-btn" disabled title="Play / Pause (Space)" aria-label="Play">
            <svg class="play-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
              <path d="M7 5l12 7-12 7z"/>
            </svg>
            <svg class="pause-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" hidden>
              <path d="M6 5h4v14H6zM14 5h4v14h-4z"/>
            </svg>
          </button>
          <button id="next-1" class="icon-btn" disabled title="Next (→)" aria-label="Next">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
              <path d="M15 5h2v14h-2zM4 5l11 7-11 7z"/>
            </svg>
          </button>
        </div>
        <div class="controls-right">
          <span id="cursor-info"></span>
        </div>
      </div>
    </section>

    <aside class="side-pane" id="side-pane" data-tab="trade">
      <button type="button" class="drawer-toggle" id="drawer-toggle" aria-expanded="true">Trade · Tape · History</button>
      <div class="drawer-tabs" id="drawer-tabs" role="tablist">
        <button type="button" data-tab="trade" class="active" role="tab" aria-selected="true">Trade</button>
        <button type="button" data-tab="tape"  role="tab" aria-selected="false">Tape</button>
        <button type="button" data-tab="history" role="tab" aria-selected="false">History</button>
      </div>
      <div class="trade-panel">
        <h3>Place trade</h3>
        <div class="row">
          <label>Type
            <select id="t-type">
              <option value="market" selected>Market</option>
              <option value="limit">Limit</option>
            </select>
          </label>
          <label id="limit-row" style="display:none">Price
            <input type="number" id="t-limit" step="any" placeholder="limit price" />
          </label>
          <button type="button" class="pick" data-pick="limit" id="pick-limit" style="display:none" title="set from chart">&#127919;</button>
        </div>
        <div class="row">
          <label>Qty <input type="number" id="t-qty" value="1" step="any" min="0" /></label>
        </div>
        <div class="row sltp-row">
          <label class="toggle-label" for="use-sl"><input type="checkbox" id="use-sl" /> SL %</label>
          <input type="number" id="t-sl-pct" step="0.01" placeholder="off" disabled />
          <button type="button" class="pick" data-pick="sl" title="set SL from chart">&#127919;</button>
        </div>
        <div class="row sltp-row">
          <label class="toggle-label" for="use-tp"><input type="checkbox" id="use-tp" /> TP %</label>
          <input type="number" id="t-tp-pct" step="0.01" placeholder="off" disabled />
          <button type="button" class="pick" data-pick="tp" title="set TP from chart">&#127919;</button>
        </div>
        <div class="row">
          <label>Side for picks
            <select id="pick-side">
              <option value="long">Long</option>
              <option value="short">Short</option>
            </select>
          </label>
        </div>
        <div class="row buttons">
          <button id="long-btn" class="long" disabled>Long</button>
          <button id="short-btn" class="short" disabled>Short</button>
        </div>
        <div class="row">
          <span id="mark-info"></span>
        </div>
      </div>

      <div class="tape-panel">
        <h3>Time &amp; Sales</h3>
        <div class="tape-controls">
          <span class="tc-label">Large = top</span>
          <input type="range" id="tape-large-pct" min="1" max="500" step="1" value="50" />
          <span id="tape-large-pct-val" class="tc-readout">5%</span>
        </div>
        <div id="tape-status" class="tape-status"></div>
        <div id="tape-list" class="tape-list"></div>
      </div>

      <div class="trades-panel">
        <h3>Trades</h3>
        <div class="totals" id="totals"></div>
        <table id="trades-table">
          <thead><tr>
            <th>Side</th><th>Qty</th><th>Entry</th><th>Exit</th><th>P&amp;L</th><th></th>
          </tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </aside>
  </main>

  <div class="modal-backdrop" id="auth-modal" hidden>
    <div class="modal-card auth-card" role="dialog" aria-modal="true" aria-label="Sign in or sign up">
      <button class="modal-close" type="button" id="auth-modal-close" aria-label="Close">&times;</button>
      <div class="brand">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="40" height="40" rx="8" fill="#0f1218"/>
          <g transform="rotate(40 20 20)">
            <line x1="20" y1="6" x2="20" y2="34" stroke="#26a69a" stroke-width="2" stroke-linecap="round"/>
            <rect x="15" y="12" width="10" height="16" rx="2" fill="#26a69a"/>
          </g>
        </svg>
        <span>Backtick</span>
      </div>
      <h1 id="m-title">Sign in</h1>
      <p class="subtitle" id="m-subtitle">Welcome back. Pick up where you left off.</p>

      <form id="m-form">
        <input type="email" id="m-email" placeholder="email" autocomplete="email" required />
        <input type="password" id="m-password" placeholder="password (min 8 chars)" autocomplete="current-password" minlength="8" required />
        <button type="submit" class="primary" id="m-submit">Sign in</button>
        <div class="error" id="m-err"></div>
      </form>

      <div class="divider">or</div>
      <a class="google-btn" href="/api/auth/google/start">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.49h4.84a4.14 4.14 0 01-1.79 2.72v2.26h2.9c1.7-1.56 2.69-3.87 2.69-6.63z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.25c-.8.54-1.83.86-3.06.86-2.35 0-4.34-1.58-5.05-3.72H.96v2.33A9 9 0 009 18z"/>
          <path fill="#FBBC05" d="M3.95 10.71A5.4 5.4 0 013.66 9c0-.59.1-1.17.29-1.71V4.96H.96A9 9 0 000 9c0 1.45.35 2.82.96 4.04l2.99-2.33z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 009 0 9 9 0 00.96 4.96l2.99 2.33C4.66 5.16 6.65 3.58 9 3.58z"/>
        </svg>
        Continue with Google
      </a>

      <div class="toggle">
        <span id="m-toggle-prompt">No account?</span> <a href="#" id="m-toggle-link">Create one</a>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script src="/static/symbol-picker.js"></script>
  <script src="/static/auth-modal.js"></script>
  <script src="/static/pwa.js"></script>
</body>
</html>
