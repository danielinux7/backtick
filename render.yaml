services:
  - type: web
    name: backtick
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt && python scripts/bump_sw_version.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromDatabase:
          name: backtick-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Sign in with Apple — set in the Render dashboard. All four are required
      # for the Apple button to work; if any is absent, /apple/* returns 503 and
      # the feature stays inert (Google + email auth unaffected).
      - key: APPLE_CLIENT_ID        # Services ID, e.g. com.backtick.web
        sync: false
      - key: APPLE_TEAM_ID          # 10-char Apple Developer Team ID
        sync: false
      - key: APPLE_KEY_ID           # Key ID of the Sign-in-with-Apple .p8 key
        sync: false
      - key: APPLE_PRIVATE_KEY      # full .p8 PEM contents (-----BEGIN PRIVATE KEY----- …)
        sync: false

databases:
  - name: backtick-db
    plan: free
    region: frankfurt
    databaseName: backtick
    user: backtick
